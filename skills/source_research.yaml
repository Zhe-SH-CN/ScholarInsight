version: 1
agent: SourceResearchAgent
mission: >
  Find, score, fetch, and preserve real public sources. This agent is
  responsible for recall and source hygiene; it does not analyze claims.
research_principles:
  - Seed URLs are user-provided evidence hints and should be collected first.
  - Search results are candidates, not facts.
  - Failed fetches are recorded, not replaced with generated content.
  - Official sources and third-party sources must remain distinguishable.
artifact_contract:
  writes:
    - sources/_index.jsonl
    - sources/{source_id}.json
    - documents/_index.jsonl
    - documents/{source_id}.txt
quality_metrics:
  source_recall: number of unique accepted candidates
  fetch_success_rate: fetched_ok / source_candidates
  source_mix: distribution across official/pricing/docs/changelog/review/blog/other
  freshness_hint: whether source type or title suggests current product information
failure_modes:
  - Search provider unavailable or rate-limited.
  - SPA pages return navigation text without meaningful content.
  - Duplicated URLs consume max_sources budget.
  - Review sources are mistaken for official product facts.
skills:
  - id: skill.source_discovery.v1
    purpose: Execute Planner SourceTask tool calls and discover real public sources from seed URLs and live search results.
    method:
      - Normalize and validate seed URLs.
      - Run Planner-generated SourceTask queries through the configured SearchTool.
      - Record each SearchTool call with task_id, entity, dimension, intent, query, and expected_source_types.
      - Merge seed and search results, deduplicate by normalized URL.
      - Stop at max_sources to keep runs bounded.
    input_schema:
      source_tasks: SourceTask[]
      queries: string[]
      seed_urls: string[]
      max_sources: integer
      max_sources_per_query: integer
      auto_discover_sources: boolean
    output_schema:
      candidates: SourceCandidate[]
    acceptance:
      - Only http/https URLs are accepted.
      - Search results are produced by real SearchTool providers, not invented by the LLM.
      - Duplicate normalized URLs are removed.
      - Candidate includes query, title, snippet, source_type, and score when available.
    rejection:
      - Search result pages, login pages, or empty URLs.
      - Candidate with unsupported scheme.
  - id: skill.source_quality_scoring.v1
    purpose: Classify and score source usefulness before collection.
    method:
      - Infer source_type from URL and title.
      - Prioritize official product, pricing, docs, changelog, enterprise/security pages.
      - Keep review/blog/community sources, but treat them as lower-authority context.
      - Preserve score as a ranking signal, not as truth.
    input_schema:
      candidate: SourceCandidate
    output_schema:
      source_type: string
      score: number
      rationale: string
    acceptance:
      - Score remains between 0 and 1.
      - source_type uses backend-supported labels.
      - Official and third-party source types are not merged.
  - id: skill.web_collection.v1
    purpose: Fetch pages, extract readable text, and store local snapshots.
    method:
      - Fetch with configured user agent, timeout, redirect following, and optional proxy.
      - Extract main content with trafilatura and selectolax fallback.
      - Persist content even when analysis later fails.
      - Record ok/error status for every attempted document.
    input_schema:
      candidates: SourceCandidate[]
    output_schema:
      documents: SourceDocument[]
    acceptance:
      - Successful document has non-empty content and content_hash.
      - Failed document includes error and ok=false.
      - No failed document is replaced by mocked text.
