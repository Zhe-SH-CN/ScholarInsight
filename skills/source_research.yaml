version: 1
agent: SourceResearchAgent
mission: >
  Find, score, and retrieve relevant academic papers from the local paper
  library using embedding-based search. This agent is responsible for recall
  and source hygiene; it does not analyze claims.
research_principles:
  - Seed URLs are user-provided evidence hints and should be collected first.
  - Local paper search results are candidates, not facts.
  - Failed fetches are recorded, not replaced with generated content.
  - Paper metadata, abstracts, and focused text must remain distinguishable.
artifact_contract:
  writes:
    - sources/_index.jsonl
    - sources/{source_id}.json
    - documents/_index.jsonl
    - documents/{source_id}.txt
quality_metrics:
  source_recall: number of unique accepted candidates
  fetch_success_rate: fetched_ok / source_candidates
  source_mix: distribution across academic_paper/seed_url/other
  freshness_hint: whether venue, year, or title suggests current research relevance
failure_modes:
  - Local paper index or embeddings are unavailable.
  - PDF extraction produced insufficient focused text.
  - Duplicated URLs consume max_sources budget.
  - Abstract-only snippets are mistaken for full-paper evidence.
skills:
  - id: skill.source_discovery.v1
    purpose: Execute Planner SourceTask tool calls and discover relevant papers from seed URLs and the local paper index.
    method:
      - Normalize and validate seed URLs.
      - Run Planner-generated SourceTask queries through LocalPaperSearchTool.
      - Record each SearchTool call with task_id, entity, dimension, intent, query, and expected_source_types.
      - Merge seed and local paper results, deduplicate by normalized path or URL.
      - Stop at max_sources to keep runs bounded.
    input_schema:
      source_tasks: SourceTask[]
      queries: string[]
      seed_urls: string[]
      max_sources: integer
      max_sources_per_query: integer
      auto_discover_sources: boolean
    output_schema:
      candidates: SourceCandidate[]
    acceptance:
      - Local file paths and http/https URLs are accepted when they point to real papers.
      - Search results are produced by LocalPaperSearchTool, not invented by the LLM.
      - Duplicate normalized URLs are removed.
      - Candidate includes query, title, abstract/snippet, source_type, content, and score when available.
    rejection:
      - Empty paths, missing paper text, or non-paper metadata files.
      - Candidate with unsupported scheme.
  - id: skill.source_quality_scoring.v1
    purpose: Classify and score source usefulness before collection.
    method:
      - Infer source_type from URL and title.
      - Prioritize academic_paper candidates with focused_text and high semantic score.
      - Keep seed URLs when provided, but treat them as supplementary context.
      - Preserve score as a ranking signal, not as truth.
    input_schema:
      candidate: SourceCandidate
    output_schema:
      source_type: string
      score: number
      rationale: string
    acceptance:
      - Score remains between 0 and 1.
      - source_type uses backend-supported labels such as academic_paper or other.
      - Paper-derived and seed-derived source types are not merged.
  - id: skill.web_collection.v1
    purpose: Materialize paper text or fetch seed pages, then store local snapshots.
    method:
      - Persist provider-returned focused_text directly when available.
      - Fetch seed pages with configured user agent, timeout, redirect following, and optional proxy.
      - Extract main content with trafilatura and selectolax fallback only for web URLs.
      - Persist content even when analysis later fails.
      - Record ok/error status for every attempted document.
    input_schema:
      candidates: SourceCandidate[]
    output_schema:
      documents: SourceDocument[]
    acceptance:
      - Successful document has non-empty content and content_hash.
      - Failed document includes error and ok=false.
      - No failed document is replaced by mocked text.
