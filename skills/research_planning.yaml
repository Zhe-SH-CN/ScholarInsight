version: 1
agent: ResearchPlanningAgent
mission: >
  Turn an open-ended academic research request into a bounded, auditable
  research plan. This agent decides what paper reasoning patterns should be
  analyzed, how the local paper library should be queried, and how conclusions
  will be judged.
research_principles:
  - Preserve user-supplied target topic and seed papers unless the user explicitly changes them.
  - Prefer narrow, source-intent queries over broad market wording.
  - Separate evidence requirements from report style requirements.
  - Treat missing evidence as a research gap, not as permission to infer.
artifact_contract:
  writes:
    - plan.json
    - dag.json
  must_include:
    - research_goal
    - papers
    - dimensions
    - queries
    - quality_rules
    - required_agents
quality_metrics:
  query_coverage: proportion of dimensions with at least one query
  source_intent_mix: official/docs/review/comparison query balance
  scope_clarity: whether dimensions and papers are explicit
failure_modes:
  - Over-broad queries create noisy sources.
  - Missing paper aliases reduce recall.
  - Quality rules become vague and cannot be checked downstream.
skills:
  - id: skill.scope_planning.v1
    purpose: Normalize the user request into a precise research scope.
    method:
      - Extract target topic, seed papers, dimensions, and research goal.
      - Preserve explicit user choices and only fill defaults for missing dimensions.
      - Record assumptions in plan.notes instead of hiding them.
    input_schema:
      project_name: string
      target_topic: string
      seed_papers: string[]
      analysis_dimensions: string[]
      research_goal: string
    output_schema:
      research_goal: string
      papers: string[]
      dimensions: string[]
      notes: string
    acceptance:
      - dimensions use canonical keys from the backend schema.
      - notes disclose all assumptions.
  - id: skill.query_design.v1
    purpose: Produce search-engine-ready queries and tool-call plans for real public-source discovery.
    method:
      - Generate queries per dimension and per source intent.
      - Convert high-level research needs into SourceTask tool calls with entity, dimension, intent, query, expected_source_types, and rationale.
      - Include paper-name variants when obvious.
      - Prefer official, docs, review, and comparison intents.
    input_schema:
      papers: string[]
      dimensions: string[]
      research_goal: string
    output_schema:
      queries: string[]
      source_tasks: SourceTask[]
    acceptance:
      - Each query can be pasted directly into a search engine.
      - Each SourceTask is executable by LocalPaperSearchTool without private browsing context.
      - At least one query targets official/paper information.
    rejection:
      - Generic queries such as "market analysis" without paper names.
      - Queries that require private or paid data sources.
  - id: skill.quality_contract.v1
    purpose: Define downstream quality rules before collection starts.
    method:
      - Set Evidence requirements: URL, title, quote, fetched_at, source_type, confidence.
      - Set Claim rules: cite evidence_id, mark low support, avoid absolute wording.
      - Set report rules: distinguish fact, interpretation, recommendation, and uncertainty.
    input_schema:
      dimensions: string[]
      research_goal: string
    output_schema:
      quality_rules: string[]
    acceptance:
      - Every rule can be checked by downstream code or displayed as a quality gate.
      - Rules mention evidence sufficiency and citation requirements.
