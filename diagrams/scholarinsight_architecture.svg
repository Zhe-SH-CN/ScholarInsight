<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" width="1600" height="980">
  <rect x="0" y="0" width="1600" height="980" fill="#f7fafc"/>
  <text x="80" y="78" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#0f172a">ScholarInsight Quality-Control Architecture</text>
  <text x="82" y="112" font-family="Arial, sans-serif" font-size="20" fill="#475569">Local literature retrieval plus source-role gates, evidence certificates, hard negatives, and falsification-aware reports.</text>

  <rect x="70" y="150" width="330" height="290" rx="18" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <circle cx="105" cy="188" r="20" fill="#0f766e"/>
  <text x="99" y="194" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">1</text>
  <text x="135" y="194" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#0f172a">Local Corpus</text>
  <text x="100" y="235" font-family="Arial, sans-serif" font-size="16" fill="#334155">paper_index.json</text>
  <text x="100" y="258" font-family="Arial, sans-serif" font-size="13" fill="#475569">metadata, text snippets, local paths</text>
  <text x="100" y="302" font-family="Arial, sans-serif" font-size="16" fill="#334155">embeddings.npy</text>
  <text x="100" y="325" font-family="Arial, sans-serif" font-size="13" fill="#475569">35K paper vectors for local retrieval</text>
  <text x="100" y="369" font-family="Arial, sans-serif" font-size="16" fill="#334155">PDF / HTML / Markdown papers</text>
  <text x="100" y="392" font-family="Arial, sans-serif" font-size="13" fill="#475569">stored outside git and reused by runs</text>

  <rect x="460" y="150" width="470" height="290" rx="18" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <circle cx="495" cy="188" r="20" fill="#0f766e"/>
  <text x="489" y="194" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">2</text>
  <text x="525" y="194" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#0f172a">Source Selection</text>
  <rect x="500" y="225" width="180" height="66" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="524" y="255" font-family="Arial, sans-serif" font-size="16" fill="#334155">Embedding search</text>
  <text x="524" y="277" font-family="Arial, sans-serif" font-size="13" fill="#475569">broad candidate pool</text>
  <rect x="710" y="225" width="180" height="66" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="734" y="255" font-family="Arial, sans-serif" font-size="16" fill="#334155">CUDA reranker</text>
  <text x="734" y="277" font-family="Arial, sans-serif" font-size="13" fill="#475569">bge-reranker score</text>
  <rect x="500" y="325" width="180" height="66" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="524" y="355" font-family="Arial, sans-serif" font-size="16" fill="#334155">Source roles</text>
  <text x="524" y="377" font-family="Arial, sans-serif" font-size="13" fill="#475569">core, benchmark, adjacent</text>
  <rect x="710" y="325" width="180" height="66" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="734" y="355" font-family="Arial, sans-serif" font-size="16" fill="#334155">Rejected pool R</text>
  <text x="734" y="377" font-family="Arial, sans-serif" font-size="13" fill="#475569">reason and boundary use</text>

  <rect x="990" y="150" width="540" height="290" rx="18" fill="#fffbeb" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="1025" cy="188" r="20" fill="#0f766e"/>
  <text x="1019" y="194" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">3</text>
  <text x="1055" y="194" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#0f172a">Evidence and Claim Certification</text>
  <rect x="1030" y="225" width="210" height="66" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="1054" y="255" font-family="Arial, sans-serif" font-size="16" fill="#334155">Evidence clusters</text>
  <text x="1054" y="277" font-family="Arial, sans-serif" font-size="13" fill="#475569">quotes, mechanisms, papers</text>
  <rect x="1280" y="225" width="210" height="66" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="1304" y="255" font-family="Courier New, monospace" font-size="15" fill="#0f172a">g(c)=1</text>
  <text x="1304" y="277" font-family="Arial, sans-serif" font-size="13" fill="#475569">multi-paper claim gate</text>
  <rect x="1030" y="325" width="210" height="66" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="1054" y="355" font-family="Arial, sans-serif" font-size="16" fill="#334155">Report-ready claims</text>
  <text x="1054" y="377" font-family="Arial, sans-serif" font-size="13" fill="#475569">verified, bounded synthesis</text>
  <rect x="1280" y="325" width="210" height="66" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="1304" y="355" font-family="Arial, sans-serif" font-size="16" fill="#334155">Audit-only backlog</text>
  <text x="1304" y="377" font-family="Arial, sans-serif" font-size="13" fill="#475569">single-paper or challenged</text>

  <line x1="400" y1="295" x2="450" y2="295" stroke="#334155" stroke-width="3"/>
  <polygon points="450,295 438,288 438,302" fill="#334155"/>
  <line x1="930" y1="295" x2="980" y2="295" stroke="#334155" stroke-width="3"/>
  <polygon points="980,295 968,288 968,302" fill="#334155"/>

  <rect x="70" y="520" width="570" height="240" rx="18" fill="#fff1f2" stroke="#fda4af" stroke-width="2"/>
  <circle cx="105" cy="558" r="20" fill="#0f766e"/>
  <text x="99" y="564" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">4</text>
  <text x="135" y="564" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#0f172a">Hard-Negative and Falsification Layer</text>
  <text x="105" y="612" font-family="Arial, sans-serif" font-size="16" fill="#334155">Rejected and adjacent sources become boundary tests.</text>
  <text x="105" y="646" font-family="Arial, sans-serif" font-size="16" fill="#334155">Each report-ready claim receives:</text>
  <text x="128" y="678" font-family="Arial, sans-serif" font-size="13" fill="#475569">falsification criterion</text>
  <text x="128" y="704" font-family="Arial, sans-serif" font-size="13" fill="#475569">benchmark or task perturbation</text>
  <text x="128" y="730" font-family="Arial, sans-serif" font-size="13" fill="#475569">expected failure mode and negative-result log</text>

  <rect x="720" y="520" width="810" height="240" rx="18" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/>
  <circle cx="755" cy="558" r="20" fill="#0f766e"/>
  <text x="749" y="564" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">5</text>
  <text x="785" y="564" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#0f172a">Advisor-Facing Artifacts</text>
  <rect x="760" y="605" width="180" height="78" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="786" y="635" font-family="Arial, sans-serif" font-size="16" fill="#334155">report.md</text>
  <text x="786" y="659" font-family="Arial, sans-serif" font-size="13" fill="#475569">ready vs backlog</text>
  <rect x="970" y="605" width="210" height="78" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="996" y="635" font-family="Arial, sans-serif" font-size="16" fill="#334155">mentor packet</text>
  <text x="996" y="659" font-family="Arial, sans-serif" font-size="13" fill="#475569">human review form</text>
  <rect x="1210" y="605" width="250" height="78" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="1236" y="635" font-family="Arial, sans-serif" font-size="16" fill="#334155">experiment packet</text>
  <text x="1236" y="659" font-family="Arial, sans-serif" font-size="13" fill="#475569">pilot tables and ablations</text>
  <text x="786" y="724" font-family="Courier New, monospace" font-size="15" fill="#0f172a">h(c)=g(c) AND counterexample_covered(c) AND falsification_plan_exists(c)</text>

  <path d="M800 405 C720 510 560 560 640 640" stroke="#dc2626" stroke-width="3" stroke-dasharray="8 8" fill="none"/>
  <polygon points="640,640 628,633 630,647" fill="#dc2626"/>
  <line x1="640" y1="640" x2="710" y2="640" stroke="#334155" stroke-width="3"/>
  <polygon points="710,640 698,633 698,647" fill="#334155"/>
  <path d="M1280 392 C1270 470 1050 500 1040 600" stroke="#7c3aed" stroke-width="3" stroke-dasharray="8 8" fill="none"/>
  <polygon points="1040,600 1033,588 1047,590" fill="#7c3aed"/>

  <rect x="70" y="812" width="1460" height="112" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="105" y="850" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#0f172a">Bounded guarantee</text>
  <text x="105" y="880" font-family="Arial, sans-serif" font-size="16" fill="#334155">If h(c)=1, the artifact exposes evidence ids, independent papers, source-role boundaries, hard-negative context, and a falsification plan.</text>
  <text x="105" y="906" font-family="Arial, sans-serif" font-size="13" fill="#475569">It does not prove that a claim is true, novel, useful, publishable, or sufficient for AAAI submission.</text>
</svg>
